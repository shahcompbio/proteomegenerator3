# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/modules/meta-schema.json
name: "lraa_merge"
description: Merge per-sample LRAA GTFs into a cohort-level GTF using merge_LRAA_GTFs.py
keywords:
  - transcript-merge
  - long-read
  - multi-sample
tools:
  - "lraa":
      description: "Long Read Alignment Assembler - isoform discovery and quantification from long-read RNA-seq"
      homepage: "https://github.com/MethodsDev/LongReadAlignmentAssembler"
      documentation: "https://github.com/MethodsDev/LongReadAlignmentAssembler/wiki"
      tool_dev_url: "https://github.com/MethodsDev/LongReadAlignmentAssembler"
      doi: "10.64898/2026.02.12.705617"
      licence: ["BSD-3-Clause"]
      identifier: null

input:
  - - gtfs:
        type: file
        description: Per-sample LRAA GTF files to merge
        pattern: "*.gtf"
  - - ref_genome:
        type: file
        description: Reference genome FASTA
        pattern: "*.{fa,fasta}"

output:
  gtf:
    - - meta:
          type: map
          description: Meta map with id='merge'
      - "cohort.LRAA.merged.gtf":
          type: file
          description: Merged cohort GTF
          pattern: "*.gtf"
  tracking:
    - "cohort.LRAA.merged.gtf.tracking.tsv":
        type: file
        description: Provenance tracking for merged transcripts
        pattern: "*.tracking.tsv"
  versions:
    - "versions.yml":
        type: file
        description: File containing software versions
        pattern: "versions.yml"

authors:
  - "@apsteinberg"
maintainers:
  - "@apsteinberg"
