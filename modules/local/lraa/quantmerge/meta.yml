# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/modules/meta-schema.json
name: "lraa_quantmerge"
description: Merge per-sample LRAA quant.expr files into a cohort expression matrix
keywords:
  - quantification
  - expression-matrix
  - multi-sample
tools:
  - "python":
      description: "Python script to merge LRAA expression tables"
      homepage: "https://www.python.org/"
      licence: ["PSF-2.0"]
      identifier: null

input:
  - - quant_files:
        type: file
        description: Per-sample LRAA .quant.expr files
        pattern: "*.quant.expr"

output:
  matrix:
    - - meta:
          type: map
          description: Meta map with id='merge'
      - "cohort.expr_matrix.tsv":
          type: file
          description: Cohort-level expression matrix (transcript × sample TPM)
          pattern: "*.tsv"
  versions:
    - "versions.yml":
        type: file
        description: File containing software versions
        pattern: "versions.yml"

authors:
  - "@apsteinberg"
maintainers:
  - "@apsteinberg"
