# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/modules/meta-schema.json
name: "reannotategtf"
description: Re-annotate a gffcompare-annotated GTF with reference gene/transcript IDs
keywords:
  - gtf
  - gffcompare
  - reannotation
  - transcriptome
tools:
  - "reannotate_gtf.py":
      description: "Re-annotate gffcompare GTF with reference IDs and tool-specific novel prefixes"
      homepage: "https://github.com/kentsislab/proteomegenerator3"
      licence: ["MIT"]
      identifier: null

input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1' ]`
    - annotated_gtf:
        type: file
        description: gffcompare-annotated GTF file
        pattern: "*.annotated.gtf"

output:
  gtf:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.reannotated.gtf":
          type: file
          description: Re-annotated GTF with reference IDs restored for exact matches
          pattern: "*.reannotated.gtf"
  versions:
    - "versions.yml":
        type: file
        description: File containing software versions
        pattern: "versions.yml"

authors:
  - "@apsteinberg"
maintainers:
  - "@apsteinberg"
