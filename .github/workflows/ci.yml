name: CI Tests
on:
  push:
    branches: [main, dev]
  pull_request:
  release:
    types: [published]

concurrency:
  group: "${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}"
  cancel-in-progress: true

jobs:
  nf-test-changes:
    name: Detect changed tests
    runs-on: ubuntu-latest
    outputs:
      total: ${{ steps.list.outputs.total }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Nextflow
        uses: nf-core/setup-nextflow@v1
        with:
          version: "latest-stable"

      - name: Install nf-test
        uses: nf-core/setup-nf-test@v1
        with:
          version: 0.9.2

      - name: Count tests
        id: list
        run: |
          TOTAL=$(nf-test list | wc -l | tr -d ' ')
          echo "total=$TOTAL" >> $GITHUB_OUTPUT

  test:
    name: "Shard ${{ matrix.shard }}/${{ needs.nf-test-changes.outputs.total > 4 && 4 || needs.nf-test-changes.outputs.total }}"
    needs: [nf-test-changes]
    if: ${{ needs.nf-test-changes.outputs.total > 0 }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Set up JDK 21
        uses: actions/setup-java@v2
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Nextflow
        uses: nf-core/setup-nextflow@v1
        with:
          version: "latest-stable"

      - name: Install nf-test
        uses: nf-core/setup-nf-test@v1
        with:
          version: 0.9.2

      - name: Run Tests (shard ${{ matrix.shard }}/4)
        run: nf-test test --profile test,docker --ci --verbose --shard ${{ matrix.shard }}/4

      - name: Output log on failure
        if: failure()
        run: |
          find .nf-test/tests -name "nextflow.log" -exec cat {} +

  confirm-pass:
    runs-on: ubuntu-latest
    needs: [nf-test-changes, test]
    if: always()
    steps:
      - name: All tests ok
        if: ${{ !contains(needs.*.result, 'failure') }}
        run: exit 0
      - name: One or more tests failed
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1
